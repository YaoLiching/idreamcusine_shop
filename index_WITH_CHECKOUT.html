<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iDream 廚房 — 線上訂購</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --espresso: #2c1a0e;
  --mocha: #5c3d2e;
  --caramel: #c07942;
  --caramel-light: #f5e6d3;
  --latte: #e8d5bc;
  --cream: #faf6f0;
  --text-main: #3d2817;
  --border-color: #d4c5b9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Noto Sans TC', sans-serif; 
  background: var(--cream); 
  color: var(--text-main);
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  margin-bottom: 10px;
  color: var(--espresso);
}

.subtitle {
  color: #666;
  margin-bottom: 30px;
  font-size: 14px;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: var(--text-main);
}

input, textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border-color);
  border-radius: 5px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: var(--caramel);
  box-shadow: 0 0 5px rgba(192, 121, 66, 0.3);
}

button {
  width: 100%;
  padding: 12px;
  background: var(--caramel);
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
}

button:hover {
  background: var(--mocha);
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.info-box {
  background: #f5e6d3;
  padding: 15px;
  border-left: 4px solid var(--caramel);
  margin-bottom: 20px;
  border-radius: 3px;
  font-size: 14px;
}

.success-message {
  background: #d4edda;
  border: 1px solid #c3e6cb;
  color: #155724;
  padding: 15px;
  border-radius: 5px;
  margin-bottom: 20px;
}

.error-message {
  background: #f8d7da;
  border: 1px solid #f5c6cb;
  color: #721c24;
  padding: 15px;
  border-radius: 5px;
  margin-bottom: 20px;
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

.product {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border: 1px solid var(--border-color);
  border-radius: 5px;
}

.product-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.product-name {
  font-weight: 600;
  color: var(--espresso);
}

.product-price {
  color: var(--caramel);
  font-weight: 600;
}

.product-qty {
  display: flex;
  align-items: center;
  gap: 10px;
}

.product-qty button {
  width: 30px;
  padding: 5px;
  margin: 0;
  font-size: 14px;
}

.product-qty input {
  width: 50px;
  padding: 5px;
  text-align: center;
}

.cart-summary {
  background: var(--caramel-light);
  padding: 20px;
  border-radius: 5px;
  margin: 20px 0;
}

.cart-total {
  font-size: 24px;
  font-weight: 700;
  color: var(--espresso);
}

.loading-spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid rgba(192, 121, 66, 0.3);
  border-radius: 50%;
  border-top-color: var(--caramel);
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--border-color);
}

.tab-button {
  padding: 10px 20px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  font-size: 16px;
  cursor: pointer;
  color: var(--text-sub);
}

.tab-button.active {
  border-bottom-color: var(--caramel);
  color: var(--espresso);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}
</style>
</head>
<body>

<div class="container">

  <!-- 歡迎/登錄畫面 -->
  <div id="welcome-screen" class="screen active">
    <h1>iDream 廚房</h1>
    <p class="subtitle">喵老師的醜蔬果手作/選品</p>
    
    <div class="info-box">
      ✅ LINE 購物車系統已上線<br>
      請填寫以下資訊以開始購物
    </div>

    <div class="form-group">
      <label for="line-name">您的 LINE 名稱</label>
      <input type="text" id="line-name" placeholder="例如：王小明">
    </div>

    <div class="form-group">
      <label for="real-name">真實姓名 *</label>
      <input type="text" id="real-name" placeholder="請輸入您的真實姓名" required>
    </div>

    <div class="form-group">
      <label for="phone">電話號碼 *</label>
      <input type="tel" id="phone" placeholder="0912-345-678" required>
    </div>

    <div class="form-group">
      <label for="email">Email *</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>

    <button onclick="submitLoginForm()">開始購物</button>
  </div>

  <!-- 購物畫面 -->
  <div id="shopping-screen" class="screen">
    <h1>iDream 廚房</h1>
    <p class="subtitle">喵老師的醜蔬果手作/選品</p>

    <div class="success-message">
      歡迎，<strong id="welcome-name"></strong>！
      <button onclick="logout()" style="width: auto; background: #999; padding: 5px 10px; margin: 0 0 0 10px;">切換帳號</button>
    </div>

    <!-- 標籤頁 -->
    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('products')">📦 商品</button>
      <button class="tab-button" onclick="switchTab('cart')">🛒 購物車</button>
    </div>

    <!-- 商品列表 -->
    <div id="products-tab" class="tab-content active">
      <h2 style="margin: 20px 0 15px 0; font-size: 20px;">商品列表</h2>
      <div id="products-list"></div>
    </div>

    <!-- 購物車 -->
    <div id="cart-tab" class="tab-content">
      <h2 style="margin: 20px 0 15px 0; font-size: 20px;">購物車</h2>
      <div id="cart-items"></div>
      <div class="cart-summary">
        <div>小計</div>
        <div class="cart-total">$<span id="cart-total">0</span></div>
      </div>
      <button onclick="checkout()" id="checkout-btn">進行結帳</button>
    </div>
  </div>

  <!-- 結帳畫面 -->
  <div id="checkout-screen" class="screen">
    <h1>訂單確認</h1>
    <p class="subtitle">請確認您的訂單資訊</p>

    <div id="order-summary"></div>

    <div class="form-group">
      <label for="order-notes">備註（可選）</label>
      <textarea id="order-notes" placeholder="例如：不要含堅果、過敏提醒等" rows="4"></textarea>
    </div>

    <div class="info-box">
      確認無誤後，點擊「提交訂單」按鈕，
      我們會自動發送確認郵件到您的 Email。
    </div>

    <div id="submit-message"></div>

    <button onclick="submitOrder()" id="submit-btn">提交訂單</button>
    <button onclick="backToCart()" style="background: #999;">返回購物車</button>
  </div>

</div>

<script>
// ================================
// 配置信息 - 需要修改
// ================================
const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5-GuOlP0UeE9b9Rm-p3ZKALxQWGCFh5NXEXaBBjNP3xXprNa2HMDVzr5_EXPA1SWS/exec';
// 替換為您的 Google Apps Script 部署 URL

// 商品列表
const PRODUCTS = [
  { id: 1, name: '蔬果盒 - 小', price: 299, description: '新鮮蔬果精選組合' },
  { id: 2, name: '蔬果盒 - 大', price: 499, description: '豐富蔬果大份量' },
  { id: 3, name: '健康果汁', price: 89, description: '新鮮現榨果汁' },
  { id: 4, name: '果醬禮盒', price: 399, description: '手工製作果醬套組' },
  { id: 5, name: '乾果組合', price: 199, description: '健康零食組合' },
];

// ================================
// 全局變數
// ================================
let member = null;
let cart = {};

// ================================
// 初始化
// ================================
function init() {
  const saved = localStorage.getItem('idream_member');
  if (saved) {
    member = JSON.parse(saved);
    initCart();
    showShoppingScreen();
  } else {
    showWelcomeScreen();
  }
}

function initCart() {
  PRODUCTS.forEach(p => {
    cart[p.id] = 0;
  });
}

// ================================
// 畫面切換
// ================================
function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(el => {
    el.classList.remove('active');
  });
}

function showWelcomeScreen() {
  hideAllScreens();
  document.getElementById('welcome-screen').classList.add('active');
}

function showShoppingScreen() {
  hideAllScreens();
  document.getElementById('shopping-screen').classList.add('active');
  document.getElementById('welcome-name').textContent = member.name;
  renderProducts();
  updateCart();
}

function switchTab(tabName) {
  // 隱藏所有標籤
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.remove('active');
  });
  document.querySelectorAll('.tab-button').forEach(el => {
    el.classList.remove('active');
  });

  // 顯示選中的標籤
  document.getElementById(tabName + '-tab').classList.add('active');
  event.target.classList.add('active');

  if (tabName === 'cart') {
    updateCart();
  }
}

// ================================
// 商品相關
// ================================
function renderProducts() {
  const html = PRODUCTS.map(product => `
    <div class="product">
      <div class="product-header">
        <div>
          <div class="product-name">${product.name}</div>
          <div style="font-size: 12px; color: #666;">${product.description}</div>
        </div>
        <div class="product-price">$${product.price}</div>
      </div>
      <div class="product-qty">
        <button onclick="decreaseQty(${product.id})">−</button>
        <input type="number" value="${cart[product.id]}" onchange="setQty(${product.id}, this.value)" readonly>
        <button onclick="increaseQty(${product.id})">+</button>
      </div>
    </div>
  `).join('');
  
  document.getElementById('products-list').innerHTML = html;
}

function increaseQty(id) {
  cart[id]++;
  renderProducts();
  updateCart();
}

function decreaseQty(id) {
  if (cart[id] > 0) {
    cart[id]--;
    renderProducts();
    updateCart();
  }
}

function setQty(id, value) {
  cart[id] = Math.max(0, parseInt(value) || 0);
  renderProducts();
  updateCart();
}

// ================================
// 購物車相關
// ================================
function updateCart() {
  const items = PRODUCTS.filter(p => cart[p.id] > 0);
  const total = items.reduce((sum, p) => sum + (p.price * cart[p.id]), 0);

  const html = items.map(product => `
    <div class="product">
      <div class="product-header">
        <div class="product-name">${product.name}</div>
        <div>×${cart[product.id]} = $${product.price * cart[product.id]}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('cart-items').innerHTML = html || '<p style="color: #999;">購物車為空</p>';
  document.getElementById('cart-total').textContent = total;

  if (items.length === 0) {
    document.getElementById('checkout-btn').disabled = true;
    document.getElementById('checkout-btn').textContent = '購物車為空';
  } else {
    document.getElementById('checkout-btn').disabled = false;
    document.getElementById('checkout-btn').textContent = '進行結帳';
  }
}

// ================================
// 結帳相關
// ================================
function checkout() {
  const items = PRODUCTS.filter(p => cart[p.id] > 0);
  const total = items.reduce((sum, p) => sum + (p.price * cart[p.id]), 0);

  const itemsHtml = items.map(p => 
    `<div>• ${p.name} ×${cart[p.id]} = $${p.price * cart[p.id]}</div>`
  ).join('');

  const summary = `
    <div class="info-box">
      <strong>訂單摘要</strong><br>
      ${itemsHtml}<br>
      <strong>總計：$${total}</strong>
    </div>
  `;

  document.getElementById('order-summary').innerHTML = summary;

  hideAllScreens();
  document.getElementById('checkout-screen').classList.add('active');
}

function submitOrder() {
  const items = PRODUCTS.filter(p => cart[p.id] > 0);
  const total = items.reduce((sum, p) => sum + (p.price * cart[p.id]), 0);

  const btn = document.getElementById('submit-btn');
  const messageDiv = document.getElementById('submit-message');

  // 驗證購物車
  if (items.length === 0) {
    messageDiv.innerHTML = '<div class="error-message">購物車為空</div>';
    return;
  }

  // 禁用按鈕並顯示加載狀態
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> 提交中...';

  // 準備訂單數據
  const orderData = {
    name: member.name,
    email: member.email,
    phone: member.phone,
    items: items.map(p => ({
      name: p.name,
      quantity: cart[p.id],
      price: p.price
    })),
    notes: document.getElementById('order-notes').value
  };

  // 發送到 Google Apps Script
  fetch(GOOGLE_APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(orderData)
  })
  .then(response => response.json())
  .then(data => {
    if (data.status === 'success') {
      messageDiv.innerHTML = `
        <div class="success-message">
          ✅ 訂單已提交！<br>
          訂單編號：<strong>${data.orderId}</strong><br>
          確認郵件已發送到 ${member.email}<br>
          請檢查您的郵件收件箱。
        </div>
      `;
      
      // 清空購物車
      Object.keys(cart).forEach(key => cart[key] = 0);
      
      // 延遲後返回購物頁面
      setTimeout(() => {
        showShoppingScreen();
        document.getElementById('order-notes').value = '';
        messageDiv.innerHTML = '';
      }, 3000);
    } else {
      messageDiv.innerHTML = `<div class="error-message">❌ 提交失敗: ${data.message}</div>`;
      btn.disabled = false;
      btn.innerHTML = '提交訂單';
    }
  })
  .catch(error => {
    messageDiv.innerHTML = `<div class="error-message">❌ 網路錯誤: ${error}</div>`;
    btn.disabled = false;
    btn.innerHTML = '提交訂單';
  });
}

function backToCart() {
  showShoppingScreen();
  switchTab('cart');
}

// ================================
// 帳號相關
// ================================
function submitLoginForm() {
  const lineName = document.getElementById('line-name').value.trim() || '訪客';
  const realName = document.getElementById('real-name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!realName || !phone || !email) {
    alert('請填寫所有必填欄位');
    return;
  }

  member = {
    lineDisplayName: lineName,
    name: realName,
    phone: phone,
    email: email,
    joinDate: new Date().toISOString(),
  };

  localStorage.setItem('idream_member', JSON.stringify(member));
  initCart();
  showShoppingScreen();
}

function logout() {
  if (confirm('確定要登出嗎？')) {
    localStorage.removeItem('idream_member');
    member = null;
    showWelcomeScreen();
  }
}

// ================================
// 頁面加載
// ================================
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
