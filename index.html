<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iDream 廚房 — 線上訂購</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --espresso: #2c1a0e;
  --mocha: #5c3d2e;
  --caramel: #c07942;
  --caramel-light: #f5e6d3;
  --latte: #e8d5bc;
  --cream: #faf6f0;
  --text-main: #3d2817;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Noto Sans TC', sans-serif; 
  background: var(--cream); 
  color: var(--text-main);
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  margin-bottom: 10px;
  color: var(--espresso);
}

.subtitle {
  color: #666;
  margin-bottom: 30px;
  font-size: 14px;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: var(--text-main);
}

input {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border-color);
  border-radius: 5px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
}

input:focus {
  outline: none;
  border-color: var(--caramel);
  box-shadow: 0 0 5px rgba(192, 121, 66, 0.3);
}

button {
  width: 100%;
  padding: 12px;
  background: var(--caramel);
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
}

button:hover {
  background: var(--mocha);
}

.info-box {
  background: #f5e6d3;
  padding: 15px;
  border-left: 4px solid var(--caramel);
  margin-bottom: 20px;
  border-radius: 3px;
  font-size: 14px;
}

.success-message {
  background: #d4edda;
  border: 1px solid #c3e6cb;
  color: #155724;
  padding: 15px;
  border-radius: 5px;
  margin-bottom: 20px;
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

--border-color: #d4c5b9;
</style>
</head>
<body>

<div class="container">

  <!-- 歡迎畫面 -->
  <div id="welcome-screen" class="screen active">
    <h1>iDream 廚房</h1>
    <p class="subtitle">喵老師的醜蔬果手作/選品</p>
    
    <div class="info-box">
      ✅ LINE 購物車系統已上線<br>
      請填寫以下資訊以開始購物
    </div>

    <div class="form-group">
      <label for="line-name">您的 LINE 名稱</label>
      <input type="text" id="line-name" placeholder="例如：王小明" value="">
    </div>

    <div class="form-group">
      <label for="real-name">真實姓名 *</label>
      <input type="text" id="real-name" placeholder="請輸入您的真實姓名" required>
    </div>

    <div class="form-group">
      <label for="phone">電話號碼 *</label>
      <input type="tel" id="phone" placeholder="0912-345-678" required>
    </div>

    <div class="form-group">
      <label for="email">Email *</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>

    <button onclick="submitForm()">開始購物</button>
  </div>

  <!-- 成功畫面 -->
  <div id="success-screen" class="screen">
    <h1>歡迎！</h1>
    <p class="subtitle">您已成功登錄</p>

    <div class="success-message">
      ✅ 您的會員資料已保存<br>
      <strong id="success-name"></strong>
    </div>

    <div class="info-box">
      現在您可以開始瀏覽商品並購物<br><br>
      <strong>提示：</strong><br>
      首次購買後，系統會自動保存您的配送地址，下次購買時就不用再填了！
    </div>

    <button onclick="startShopping()">開始瀏覽商品</button>
  </div>

  <!-- 購物頁面 -->
  <div id="shopping-screen" class="screen">
    <h1>iDream 廚房</h1>
    <p class="subtitle" id="welcome-msg">喵老師的醜蔬果手作/選品</p>

    <div class="success-message">
      您已登錄為: <strong id="member-name"></strong>
    </div>

    <div class="info-box">
      🎉 購物車系統已就緒！<br><br>
      <strong>您的會員資訊：</strong><br>
      <span id="member-info"></span>
    </div>

    <button onclick="logout()" style="background: #999;">登出</button>
  </div>

</div>

<script>
// 初始化
function init() {
  // 檢查是否已登錄
  const saved = localStorage.getItem('idream_member');
  if (saved) {
    const member = JSON.parse(saved);
    showShoppingScreen(member);
  } else {
    showWelcomeScreen();
  }
}

// 顯示歡迎畫面
function showWelcomeScreen() {
  hideAllScreens();
  document.getElementById('welcome-screen').classList.add('active');
}

// 顯示成功畫面
function showSuccessScreen(name) {
  hideAllScreens();
  document.getElementById('success-message-name').textContent = name;
  document.getElementById('success-screen').classList.add('active');
}

// 顯示購物畫面
function showShoppingScreen(member) {
  hideAllScreens();
  document.getElementById('shopping-screen').classList.add('active');
  document.getElementById('welcome-msg').textContent = `歡迎回來，${member.name}！`;
  document.getElementById('member-name').textContent = member.name;
  
  const info = `
    名稱: ${member.name}<br>
    LINE: ${member.lineDisplayName}<br>
    電話: ${member.phone}<br>
    Email: ${member.email}
  `;
  document.getElementById('member-info').innerHTML = info;
}

// 隱藏所有畫面
function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(el => {
    el.classList.remove('active');
  });
}

// 提交表單
function submitForm() {
  const lineName = document.getElementById('line-name').value.trim() || '訪客';
  const realName = document.getElementById('real-name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();

  // 驗證必填欄位
  if (!realName || !phone || !email) {
    alert('請填寫所有必填欄位（*）');
    return;
  }

  // 保存會員資訊
  const member = {
    lineDisplayName: lineName,
    name: realName,
    phone: phone,
    email: email,
    joinDate: new Date().toISOString(),
  };

  localStorage.setItem('idream_member', JSON.stringify(member));

  // 顯示成功訊息
  document.getElementById('success-name').innerHTML = `
    <strong>${realName}</strong> (LINE: ${lineName})
  `;
  
  showSuccessScreen(realName);
}

// 開始購物
function startShopping() {
  const saved = localStorage.getItem('idream_member');
  if (saved) {
    const member = JSON.parse(saved);
    showShoppingScreen(member);
  }
}

// 登出
function logout() {
  if (confirm('確定要登出嗎？')) {
    localStorage.removeItem('idream_member');
    showWelcomeScreen();
  }
}

// 頁面載入時初始化
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
